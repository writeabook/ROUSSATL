name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
          components: rustfmt
      - run: cargo fmt --all -- --check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
      - run: cargo test --workspace --features testkit -- --test-threads=1

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
          components: clippy
      - run: cargo clippy --workspace --all-targets --features testkit -- -D warnings

  feature-guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"

      - name: POSIX backend compiles
        run: cargo check -p osal --no-default-features --features backend-posix

      - name: Mock backend compiles
        run: cargo check -p osal --no-default-features --features backend-mock

      - name: No backend must fail
        run: |
          if cargo check -p osal --no-default-features 2>/dev/null; then
            echo "Expected no-backend build to fail"
            exit 1
          fi

      - name: Multiple backends must fail
        run: |
          if cargo check -p osal --no-default-features --features backend-posix,backend-mock 2>/dev/null; then
            echo "Expected multi-backend build to fail"
            exit 1
          fi

  rustdoc:
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
      - run: cargo doc --workspace --no-deps --features testkit

  task-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
      - name: POSIX task contracts
        run: cargo test -p osal-backend-posix --features testkit task -- --test-threads=1
      - name: Mock task contracts
        run: cargo test -p osal-backend-mock --features testkit task -- --test-threads=1