name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
          components: rustfmt
      - run: cargo fmt --all -- --check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
      - run: cargo test --workspace --features testkit -- --test-threads=1

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
          components: clippy
      - run: cargo clippy --workspace --all-targets --features testkit -- -D warnings

  feature-guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"

      - name: POSIX backend compiles
        run: cargo check -p osal --no-default-features --features backend-posix

      - name: Mock backend compiles
        run: cargo check -p osal --no-default-features --features backend-mock

      - name: FreeRTOS fixture compiles
        run: cargo check -p osal --no-default-features --features freertos-test-fixture

      - name: FreeRTOS backend skeleton compiles (fixture)
        run: cargo check -p osal-backend-freertos --features test-fixture

      - name: FreeRTOS native facade smoke build
        env:
          ROUSSATL_FREERTOS_KERNEL_INCLUDE: ${{ github.workspace }}/tests/freertos-native-fixture/kernel/include
          ROUSSATL_FREERTOS_CONFIG_INCLUDE: ${{ github.workspace }}/tests/freertos-native-fixture/config
          ROUSSATL_FREERTOS_PORT_INCLUDE: ${{ github.workspace }}/tests/freertos-native-fixture/port
        run: cargo check -p osal --no-default-features --features backend-freertos

      - name: No backend must fail
        run: |
          if cargo check -p osal --no-default-features 2>/dev/null; then
            echo "Expected no-backend build to fail"
            exit 1
          fi

      - name: POSIX + Mock must fail
        run: |
          if cargo check -p osal --no-default-features --features backend-posix,backend-mock 2>/dev/null; then
            echo "Expected posix+mock build to fail"
            exit 1
          fi

      - name: POSIX + FreeRTOS must fail
        run: |
          if cargo check -p osal --no-default-features --features backend-posix,freertos-test-fixture 2>/dev/null; then
            echo "Expected posix+freertos build to fail"
            exit 1
          fi

      - name: Mock + FreeRTOS must fail
        run: |
          if cargo check -p osal --no-default-features --features backend-mock,freertos-test-fixture 2>/dev/null; then
            echo "Expected mock+freertos build to fail"
            exit 1
          fi

      - name: All three backends must fail
        run: |
          if cargo check -p osal --no-default-features --features backend-posix,backend-mock,freertos-test-fixture 2>/dev/null; then
            echo "Expected three-backend build to fail"
            exit 1
          fi

  rustdoc:
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
      - run: cargo doc --workspace --no-deps --features testkit

  task-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
      - name: POSIX task contracts
        run: cargo test -p osal-backend-posix --features testkit task -- --test-threads=1
      - name: Mock task contracts
        run: cargo test -p osal-backend-mock --features testkit task -- --test-threads=1